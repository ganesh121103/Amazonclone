<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="https://www.amazon.com/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Amazon Clone - A full-stack MERN e-commerce platform with millions of products, fast delivery, and secure payments." />
    <meta name="keywords" content="amazon clone, ecommerce, online shopping, MERN stack, react, nodejs" />
    <meta name="author" content="Amazon Clone" />

    <!-- Open Graph -->
    <meta property="og:title" content="Amazon Clone - Online Shopping" />
    <meta property="og:description" content="Shop the widest selection of products at the best prices." />
    <meta property="og:type" content="website" />

    <title>Amazon Clone - Online Shopping</title>
  </head>
  <body>
    <div id="root">
      <style>
        #initial-loader {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          width: 100vw;
          background-color: #f3f4f6; /* Tailwind gray-100 */
          font-family: system-ui, -apple-system, sans-serif;
        }
        @media (prefers-color-scheme: dark) {
          #initial-loader {
            background-color: #111827; /* Tailwind gray-900 */
          }
        }
        .spinner {
          width: 50px;
          height: 50px;
          border: 4px solid rgba(255, 153, 0, 0.2);
          border-left-color: #FF9900; /* Amazon orange */
          border-radius: 50%;
          animation: spin 1s linear infinite;
          margin-bottom: 16px;
        }
        .loading-text {
          color: #232F3E; /* Amazon blue-dark */
          font-size: 1.125rem;
          font-weight: 600;
          letter-spacing: 0.5px;
          animation: pulse 1.5s ease-in-out infinite;
        }
        @media (prefers-color-scheme: dark) {
          .loading-text {
            color: #ffffff;
          }
        }
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.5; }
        }
      </style>
      <div id="initial-loader">
        <div class="spinner"></div>
        <div class="loading-text">Loading Amazon Clone...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
